<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fahamu Shamba</title>
    <link rel="icon" href="/fahamu-logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: url('/images/irewolede-PvwdlXqo85k-unsplash.jpg') center center / cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo img {
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
        }
        
        .logo h1 {
            color: #2E7D32;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2E7D32;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #1B5E20;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .links {
            text-align: center;
            margin-top: 20px;
        }
        
        .links a {
            color: #2E7D32;
            text-decoration: none;
            font-size: 14px;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .message {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
        
        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }
        
        .message.success {
            background: #e8f5e8;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        
        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: calc(12px + env(safe-area-inset-top, 0px)) 12px calc(12px + env(safe-area-inset-bottom, 0px));
                background-attachment: scroll;
            }

            .container {
                margin-top: 8px;
                padding: 22px 18px;
                border-radius: 16px;
                max-width: 100%;
                box-shadow: 0 14px 28px rgba(0,0,0,0.25);
            }

            .logo {
                margin-bottom: 18px;
            }

            .logo img {
                width: 64px;
                height: 64px;
            }

            .logo h1 {
                font-size: 1.5rem;
            }

            .form-group {
                margin-bottom: 14px;
            }

            .form-group input,
            .btn {
                min-height: 46px;
            }

            .links {
                margin-top: 14px;
            }
        }

        @media (max-width: 420px) {
            .container {
                padding: 18px 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/fahamu-logo.png" alt="Fahamu Shamba" onerror="this.style.display='none'">
            <h1>Fahamu Shamba</h1>
            <p>Smart Farming Solutions</p>
        </div>
        
        <div id="message" class="message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Username or Email</label>
                <input type="text" id="email" name="email" required placeholder="Enter username or email">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn" id="loginBtn">
                Login
            </button>
        </form>
        
        <div class="links">
            <p>Don't have an account? <a href="/signup.html">Register here</a></p>
            <p><a href="/">Back to Home</a></p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(message, type) {
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // Hide message after 5 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const identifier = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!identifier || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            try {
                // Try canonical auth endpoint first (server.js), then fallback to legacy endpoint (serverless-server.js)
                const payloads = [
                    { url: '/api/auth/login', body: { username: identifier.toLowerCase(), password } },
                    { url: '/api/login', body: { username: identifier, email: identifier, password } }
                ];

                let data = null;
                let loginOk = false;
                let lastErrorMessage = 'Login failed';

                for (const attempt of payloads) {
                    const response = await fetch(attempt.url, {
                        method: 'POST',
                        credentials: 'include',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(attempt.body)
                    });

                    let responseData = {};
                    try {
                        responseData = await response.json();
                    } catch (_) {
                        responseData = {};
                    }

                    const successFlag = responseData.success === true || responseData.status === 'success';
                    if (response.ok && successFlag && responseData.token) {
                        data = responseData;
                        loginOk = true;
                        break;
                    }

                    lastErrorMessage = responseData.message || lastErrorMessage;
                }

                if (loginOk && data) {
                    showMessage('Login successful! Redirecting...', 'success');

                    // Prefer session-scoped storage; keep legacy localStorage key for compatibility.
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('user', JSON.stringify(data.user || {}));
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user || {}));
                    localStorage.removeItem('fahamu_token');
                    localStorage.removeItem('fahamu_user');

                    // Redirect to dashboard page (works for both static and routed deployments).
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 800);
                } else {
                    showMessage(lastErrorMessage, 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Network error. Please try again.', 'error');
            } finally {
                // Reset button state
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        // Prefill username after successful signup
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('username');
            const emailInput = document.getElementById('email');
            if (username && emailInput) {
                emailInput.value = username;
            }
        });
    </script>
</body>
</html>
