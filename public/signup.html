<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Fahamu Shamba</title>
    <link rel="icon" href="/fahamu-logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/toast.css">
    <script src="/language-utils.js"></script>
    <script src="/js/toast.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #87ceeb 0%, #4a9d6f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo img {
            height: 60px;
            margin-bottom: 10px;
        }
        .logo h1 {
            color: #2E7D32;
            font-size: 24px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2E7D32;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #F57C00;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #e65100;
            transform: translateY(-2px);
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #2E7D32;
            text-decoration: none;
            font-weight: 600;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .back-link a {
            color: #666;
            text-decoration: none;
        }
        
        /* ===== LANGUAGE SELECTOR ===== */
        .language-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .language-label {
            font-weight: bold;
            color: #2E7D32;
            font-size: 0.9rem;
        }
        .language-dropdown-container {
            position: relative;
            display: inline-block;
        }
        .language-dropdown-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 14px;
            background: #2E7D32;
            color: white;
            border: 2px solid white;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            min-width: 120px;
            transition: all 0.3s ease;
        }
        .language-dropdown-btn:hover {
            background: #1B5E20;
        }
        .language-dropdown-btn i {
            font-size: 0.75rem;
        }
        .language-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            z-index: 1000;
            margin-top: 5px;
            overflow: hidden;
        }
        .language-dropdown-menu.show {
            display: block;
        }
        .language-option {
            padding: 10px 14px;
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .language-option:hover {
            background: #2E7D32;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="language-wrapper">
            <span class="language-label">Language:</span>
            <div class="language-dropdown-container">
                <button type="button" class="language-dropdown-btn" id="languageBtn" onclick="toggleLanguageDropdown()">
                    <span id="languageBtnText">Choose Language</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="language-dropdown-menu" id="languageDropdownMenu">
                    <div class="language-option" onclick="selectLanguage('en', '🌐 English')">🌐 English</div>
                    <div class="language-option" onclick="selectLanguage('sw', '🌐 Kiswahili')">🌐 Kiswahili</div>
                    <div class="language-option" onclick="selectLanguage('luo', '🌐 Dholuo')">🌐 Dholuo</div>
                </div>
            </div>
            <select id="languageSelect" onchange="changeLanguage(this.value)" style="display:none;">
                <option value="en">English</option>
                <option value="sw">Kiswahili</option>
                <option value="luo">Dholuo</option>
            </select>
        </div>
        <div class="logo">
            <img src="/fahamu-logo.png" alt="Fahamu Shamba">
            <h1>Fahamu Shamba</h1>
        </div>
        <h2>Create Account</h2>
        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g., 0712345678" required>
            </div>
            <div class="form-group">
                <label>Sub-County</label>
                <select id="subcounty" required>
                    <option value="">Select Sub-County</option>
                    <option value="bondo">Bondo</option>
                    <option value="ugenya">Ugenya</option>
                    <option value="ugunja">Ugunja</option>
                    <option value="gem">Gem</option>
                    <option value="alego">Alego Usonga</option>
                    <option value="rarieda">Rarieda</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ward</label>
                <input type="text" id="ward" placeholder="Enter your ward" required>
            </div>
            <div class="form-group">
                <label>Farm Size (Acres)</label>
                <input type="number" id="farmSize" placeholder="e.g., 2" required>
            </div>
            <div class="form-group">
                <label>Main Crop</label>
                <select id="mainCrop" required>
                    <option value="">Select Crop</option>
                    <option value="maize">Maize</option>
                    <option value="beans">Beans</option>
                    <option value="rice">Rice</option>
                    <option value="sorghum">Sorghum</option>
                    <option value="cassava">Cassava</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <div class="links">
            <p>Already have an account? <a href="/login.html">Login</a></p>
        </div>
        <div class="back-link">
            <a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>
    <script>
        // Initialize language on page load
        document.addEventListener('DOMContentLoaded', () => {
            const lang = getCurrentLanguage();
            const select = document.getElementById('languageSelect');
            if (select && lang) {
                select.value = lang;
                const langNames = {
                    'en': '🌐 English',
                    'sw': '🌐 Kiswahili',
                    'luo': '🌐 Dholuo'
                };
                const btnText = document.getElementById('languageBtnText');
                if (btnText && langNames[lang]) {
                    btnText.textContent = langNames[lang];
                }
            }
            translatePage(lang);
        });
        
        // Language functions
        function changeLanguage(lang) {
            setLanguage(lang);
            translatePage(lang);
        }
        
        // Custom dropdown functions
        function toggleLanguageDropdown() {
            const menu = document.getElementById('languageDropdownMenu');
            if (menu) menu.classList.toggle('show');
        }
        
        function selectLanguage(lang, text) {
            const btnText = document.getElementById('languageBtnText');
            if (btnText) btnText.textContent = text;
            const select = document.getElementById('languageSelect');
            if (select) select.value = lang;
            const menu = document.getElementById('languageDropdownMenu');
            if (menu) menu.classList.remove('show');
            changeLanguage(lang);
        }
        
        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const container = document.querySelector('.language-dropdown-container');
            if (container && !container.contains(event.target)) {
                const menu = document.getElementById('languageDropdownMenu');
                if (menu) menu.classList.remove('show');
            }
        });
        
        function normalizeKenyaPhone(phone) {
            const digits = (phone || '').replace(/\D/g, '');
            if (digits.startsWith('0') && digits.length === 10) return `254${digits.slice(1)}`;
            if (digits.startsWith('7') && digits.length === 9) return `254${digits}`;
            if (digits.startsWith('254') && digits.length === 12) return digits;
            return phone;
        }

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const username = document.getElementById('username').value;
            const phone = normalizeKenyaPhone(document.getElementById('phone').value);
            const subcounty = document.getElementById('subcounty').value;
            const ward = document.getElementById('ward').value;
            const farmSize = document.getElementById('farmSize').value;
            const mainCrop = document.getElementById('mainCrop').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showToast('Passwords do not match!', 'error');
                return;
            }
            
            if (!username) {
                showToast('Please choose a username!', 'error');
                return;
            }

            const submitBtn = document.querySelector('#signupForm .btn');

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Creating account...';

                const registerRes = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, username, password })
                });
                const registerData = await registerRes.json();
                if (!registerRes.ok || registerData.status !== 'success') {
                    throw new Error(registerData.message || 'Registration failed');
                }

                const profileRes = await fetch('/api/auth/register-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: registerData.userId,
                        name,
                        location: subcounty,
                        ward,
                        farm_size: Number(farmSize) || null
                    })
                });
                const profileData = await profileRes.json();
                if (!profileRes.ok || profileData.status !== 'success') {
                    throw new Error(profileData.message || 'Profile setup failed');
                }

                localStorage.setItem('token', profileData.token);
                localStorage.setItem('user', JSON.stringify(profileData.user || {}));
                showToast('Account created successfully! Please login.', 'success');
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 1500);
            } catch (error) {
                showToast(error.message || 'Failed to create account', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
