<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Fahamu Shamba</title>
    <link rel="icon" href="/fahamu-logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/toast.css">
    <script src="/language-utils.js"></script>
    <script src="/js/toast.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #87ceeb 0%, #4a9d6f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo img {
            height: 60px;
            margin-bottom: 10px;
        }
        .logo h1 {
            color: #2E7D32;
            font-size: 24px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2E7D32;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #F57C00;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #e65100;
            transform: translateY(-2px);
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #2E7D32;
            text-decoration: none;
            font-weight: 600;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .back-link a {
            color: #666;
            text-decoration: none;
        }
        
        /* ===== LANGUAGE SELECTOR ===== */
        .language-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .language-label {
            font-weight: bold;
            color: #2E7D32;
            font-size: 0.9rem;
        }
        .language-dropdown-container {
            position: relative;
            display: inline-block;
        }
        .language-dropdown-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 14px;
            background: #2E7D32;
            color: white;
            border: 2px solid white;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            min-width: 120px;
            transition: all 0.3s ease;
        }
        .language-dropdown-btn:hover {
            background: #1B5E20;
        }
        .language-dropdown-btn i {
            font-size: 0.75rem;
        }
        .language-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            z-index: 1000;
            margin-top: 5px;
            overflow: hidden;
        }
        .language-dropdown-menu.show {
            display: block;
        }
        .language-option {
            padding: 10px 14px;
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .language-option:hover {
            background: #2E7D32;
            color: white;
        }
    </style>
    <link rel="stylesheet" href="/css/mobile-responsiveness-fixes.css">
</head>
<body>
    <div class="container">
        <div class="language-wrapper">
            <span class="language-label">Language:</span>
            <div class="language-dropdown-container">
                <button type="button" class="language-dropdown-btn" id="languageBtn" onclick="toggleLanguageDropdown()">
                    <span id="languageBtnText">Choose Language</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="language-dropdown-menu" id="languageDropdownMenu">
                    <div class="language-option" onclick="selectLanguage('en', '🌐 English')">🌐 English</div>
                    <div class="language-option" onclick="selectLanguage('sw', '🌐 Kiswahili')">🌐 Kiswahili</div>
                    <div class="language-option" onclick="selectLanguage('luo', '🌐 Dholuo')">🌐 Dholuo</div>
                </div>
            </div>
            <select id="languageSelect" onchange="changeLanguage(this.value)" style="display:none;">
                <option value="en">English</option>
                <option value="sw">Kiswahili</option>
                <option value="luo">Dholuo</option>
            </select>
        </div>
        <div class="logo">
            <img src="/fahamu-logo.png" alt="Fahamu Shamba">
            <h1 data-i18n="landing_title">Fahamu Shamba</h1>
        </div>
        <h2 data-i18n="create_account"></h2>
        <form id="signupForm">
            <div class="form-group">
                <label data-i18n="full_name"></label>
                <input type="text" id="name" data-i18n-placeholder="enter_full_name" required>
            </div>
            <div class="form-group">
                <label data-i18n="username"></label>
                <input type="text" id="username" data-i18n-placeholder="enter_username" required>
            </div>
            <div class="form-group">
                <label data-i18n="phone_number"></label>
                <input type="tel" id="phone" data-i18n-placeholder="example_phone" required>
            </div>
            <div class="form-group">
                <label data-i18n="sub_county"></label>
                <select id="subcounty" required>
                    <option value="" data-i18n="select_sub_county"></option>
                    <option value="bondo">Bondo</option>
                    <option value="ugenya">Ugenya</option>
                    <option value="ugunja">Ugunja</option>
                    <option value="gem">Gem</option>
                    <option value="alego">Alego Usonga</option>
                    <option value="rarieda">Rarieda</option>
                </select>
            </div>
            <div class="form-group">
                <label data-i18n="ward"></label>
                <input type="text" id="ward" data-i18n-placeholder="enter_ward" required>
            </div>
            <div class="form-group">
                <label data-i18n="farm_size"></label>
                <input type="number" id="farmSize" data-i18n-placeholder="example_farm_size" required>
            </div>
            <div class="form-group">
                <label data-i18n="password"></label>
                <input type="password" id="password" data-i18n-placeholder="create_password" required>
            </div>
            <div class="form-group">
                <label data-i18n="confirm_password"></label>
                <input type="password" id="confirmPassword" data-i18n-placeholder="confirm_your_password" required>
            </div>
            <button type="submit" class="btn" data-i18n="create_account"></button>
        </form>
        <div class="links">
            <p><span data-i18n="already_have_account"></span> <a href="/login.html" data-i18n="login"></a></p>
        </div>
        <div class="back-link">
            <a href="/"><i class="fas fa-arrow-left"></i> <span data-i18n="back_home"></span></a>
        </div>
    </div>
    <script>
        // Initialize language on page load
        document.addEventListener('DOMContentLoaded', () => {
           initializeLanguage();
        });
        
        // Language functions
        function changeLanguage(lang) {
            setLanguage(lang);
            translatePage(lang);
        }
        
        // Custom dropdown functions
        function toggleLanguageDropdown() {
            const menu = document.getElementById('languageDropdownMenu');
            if (menu) menu.classList.toggle('show');
        }
        
        function selectLanguage(lang, text) {
            const btnText = document.getElementById('languageBtnText');
            if (btnText) btnText.textContent = text;

            const normalizedLang = {
                'en': 'english',
                'sw': 'swahili',
                'luo': 'luo'
            }[lang] || 'english';
            
            const select = document.getElementById('languageSelect');
            if (select) select.value = normalizedLang;

            const menu = document.getElementById('languageDropdownMenu');
            if (menu) menu.classList.remove('show');
            changeLanguage(normalizedLang);
        }
        
        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const container = document.querySelector('.language-dropdown-container');
            if (container && !container.contains(event.target)) {
                const menu = document.getElementById('languageDropdownMenu');
                if (menu) menu.classList.remove('show');
            }
        });
        
        function normalizeKenyaPhone(phone) {
            const digits = (phone || '').replace(/\D/g, '');
            if (digits.startsWith('0') && digits.length === 10) return `254${digits.slice(1)}`;
            if (digits.startsWith('7') && digits.length === 9) return `254${digits}`;
            if (digits.startsWith('254') && digits.length === 12) return digits;
            return phone;
        }

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const username = document.getElementById('username').value;
            const phone = normalizeKenyaPhone(document.getElementById('phone').value);
            const subcounty = document.getElementById('subcounty').value;
            const ward = document.getElementById('ward').value;
            const farmSize = document.getElementById('farmSize').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showToast(t('passwords_do_not_match'), 'error'); // Assumes 'passwords_do_not_match' key exists
                return;
            }
            
            if (!username) {
                showToast(t('username_required'), 'error'); // Assumes 'username_required' key exists
                return;
            }

            const submitBtn = document.querySelector('#signupForm .btn');

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = t('loading');

                const registerRes = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, username, password })
                });
                const registerData = await registerRes.json();
                if (!registerRes.ok || registerData.status !== 'success') {
                    throw new Error(registerData.message || t('registration_failed')); // Assumes 'registration_failed'
                }

                // Get current language preference
                const currentLanguage = getCurrentLanguage();
                
                const profileRes = await fetch('/api/auth/register-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: registerData.userId,
                        name,
                        location: subcounty,
                        ward,
                        farm_size: Number(farmSize) || null,
                        preferred_language: currentLanguage
                    })
                });
                const profileData = await profileRes.json();
                if (!profileRes.ok || profileData.status !== 'success') {
                    throw new Error(profileData.message || t('profile_setup_failed'));
                }

                localStorage.setItem('token', profileData.token);
                localStorage.setItem('user', JSON.stringify(profileData.user || {}));
                showToast(t('registration_success'), 'success');
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 1500);
            } catch (error) {
                showToast(error.message || t('registration_failed'), 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = t('create_account');
            }
        });
    </script>
</body>
</html>
