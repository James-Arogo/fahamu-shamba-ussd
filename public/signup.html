<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Fahamu Shamba</title>
    <link rel="icon" href="/fahamu-logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: url('/images/irewolede-PvwdlXqo85k-unsplash.jpg') center center / cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo img {
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
        }
        
        .logo h1 {
            color: #2E7D32;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2E7D32;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #1B5E20;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .links {
            text-align: center;
            margin-top: 20px;
        }
        
        .links a {
            color: #2E7D32;
            text-decoration: none;
            font-size: 14px;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .message {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
        
        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }
        
        .message.success {
            background: #e8f5e8;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .message.inline-feedback {
            margin-top: 12px;
            margin-bottom: 0;
        }
        
        .required {
            color: #e53935;
        }
        
        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: calc(12px + env(safe-area-inset-top, 0px)) 12px calc(12px + env(safe-area-inset-bottom, 0px));
                background-attachment: scroll;
            }

            .container {
                margin-top: 8px;
                padding: 22px 16px;
                border-radius: 16px;
                max-width: 100%;
                max-height: none;
                box-shadow: 0 14px 28px rgba(0,0,0,0.25);
            }

            .logo {
                margin-bottom: 18px;
            }

            .logo img {
                width: 64px;
                height: 64px;
            }

            .logo h1 {
                font-size: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .form-group {
                margin-bottom: 14px;
            }

            .form-group input,
            .form-group select,
            .btn {
                min-height: 46px;
            }

            .links {
                margin-top: 14px;
            }
        }

        @media (max-width: 420px) {
            .container {
                padding: 18px 12px;
            }

            .info-text {
                font-size: 11px;
            }
        }
    </style>
    <script src="/js/chatbot-widget.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/fahamu-logo.png" alt="Fahamu Shamba" onerror="this.style.display='none'">
            <h1>Fahamu Shamba</h1>
            <p>Create Your Account</p>
        </div>
        
        <div id="message" class="message"></div>
        
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name <span class="required">*</span></label>
                    <input type="text" id="firstName" name="firstName" required placeholder="Enter first name">
                </div>
                
                <div class="form-group">
                    <label for="lastName">Last Name <span class="required">*</span></label>
                    <input type="text" id="lastName" name="lastName" required placeholder="Enter last name">
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="username">Username <span class="required">*</span></label>
                <input type="text" id="username" name="username" required placeholder="Choose a username">
                <div class="info-text">3-30 characters. Letters, numbers, ., _, and - only.</div>
            </div>
            
            <div class="form-group">
                <label for="phoneNumber">Phone Number <span class="required">*</span></label>
                <input type="tel" id="phoneNumber" name="phoneNumber" required placeholder="+254712345678">
                <div class="info-text">Format: +2547xxxxxxxx</div>
            </div>
            
            <div class="form-group">
                <label for="subCounty">Sub-County <span class="required">*</span></label>
                <select id="subCounty" name="subCounty" required>
                    <option value="">Select sub-county</option>
                    <option value="bondo">Bondo</option>
                    <option value="ugenya">Ugenya</option>
                    <option value="ugunja">Ugunja</option>
                    <option value="siaya">Siaya Township</option>
                    <option value="gem">Gem</option>
                    <option value="usigu">Usigu</option>
                    <option value="yimbo">Yimbo</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="farmSize">Farm Size</label>
                <select id="farmSize" name="farmSize">
                    <option value="">Select farm size</option>
                    <option value="0-1">Less than 1 acre</option>
                    <option value="1-2">1-2 acres</option>
                    <option value="2-5">2-5 acres</option>
                    <option value="5+">More than 5 acres</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="soilType">Soil Type</label>
                <select id="soilType" name="soilType">
                    <option value="">Select soil type</option>
                    <option value="loam">Loam</option>
                    <option value="sandy">Sandy</option>
                    <option value="clay">Clay</option>
                    <option value="silty">Silty</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" name="password" required placeholder="Create password">
                <div class="info-text">Use at least 10 characters with uppercase, lowercase, number, and symbol.</div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm password">
            </div>
            
            <button type="submit" class="btn" id="registerBtn">
                Create Account
            </button>
            <div id="messageInline" class="message inline-feedback"></div>
        </form>
        
        <div class="links">
            <p>Already have an account? <a href="/login.html">Login here</a></p>
            <p><a href="/">Back to Home</a></p>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const messageDiv = document.getElementById('message');
        const messageInlineDiv = document.getElementById('messageInline');

        function showMessage(message, type) {
            const targets = [messageDiv, messageInlineDiv].filter(Boolean);
            targets.forEach((target) => {
                const keepInlineClass = target.classList.contains('inline-feedback');
                target.textContent = message;
                target.className = `message ${type}${keepInlineClass ? ' inline-feedback' : ''}`;
                target.style.display = 'block';
            });

            if (messageInlineDiv) {
                messageInlineDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            
            // Hide message after 5 seconds
            setTimeout(() => {
                targets.forEach((target) => {
                    target.style.display = 'none';
                });
            }, 5000);
        }

        function normalizeKenyaPhone(phone) {
            // Remove all non-digit characters
            phone = phone.replace(/\D/g, '');
            
            // Handle different formats
            if (phone.startsWith('254') && phone.length === 12) {
                return '+' + phone;
            } else if (phone.startsWith('0') && phone.length === 10) {
                return '+254' + phone.substring(1);
            } else if (phone.startsWith('7') && phone.length === 9) {
                return '+2547' + phone.substring(1);
            } else if (phone.length === 12 && !phone.startsWith('+')) {
                return '+' + phone;
            }
            
            return phone;
        }

        function isStrongPassword(password) {
            return typeof password === 'string'
                && password.length >= 10
                && /[A-Z]/.test(password)
                && /[a-z]/.test(password)
                && /[0-9]/.test(password)
                && /[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]/.test(password);
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phoneNumber = normalizeKenyaPhone(document.getElementById('phoneNumber').value);
            const subCounty = document.getElementById('subCounty').value.trim();
            const farmSize = document.getElementById('farmSize').value;
            const soilType = document.getElementById('soilType').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validation
            if (!firstName || !lastName || !email || !phoneNumber || !subCounty) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            if (!isStrongPassword(password)) {
                showMessage('Password must be at least 10 chars with uppercase, lowercase, number, and symbol', 'error');
                return;
            }
            
            // Show loading state
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating Account...';
            
            try {
                // Canonical flow:
                // 1) Create auth user in /api/auth/register
                // 2) Complete profile in /api/auth/register-profile
                // Fallback to /api/farmers/register for legacy serverless deployments.
                const normalizedUsername = document.getElementById('username').value.trim().toLowerCase();
                const displayName = `${firstName} ${lastName}`.trim();

                if (!normalizedUsername) {
                    showMessage('Username is required', 'error');
                    return;
                }

                let registrationSuccess = false;
                let registrationMessage = 'Registration failed';
                let userPayload = null;

                const parseSafeJson = async (response) => {
                    try {
                        return await response.json();
                    } catch (_) {
                        return {};
                    }
                };

                // Step 1: Auth account creation
                const authRegisterResponse = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone: phoneNumber,
                        username: normalizedUsername,
                        email,
                        password
                    })
                });

                const authRegisterData = await parseSafeJson(authRegisterResponse);

                // Fallback is only for legacy deployments where /api/auth/register is missing.
                if (authRegisterResponse.status === 404) {
                    const fallbackResponse = await fetch('/api/farmers/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            firstName,
                            lastName,
                            email,
                            username: normalizedUsername,
                            phoneNumber,
                            subCounty,
                            farmSize,
                            soilType,
                            waterSource: 'Rainfall',
                            budget: '5000-10000',
                            preferredLanguage: 'english',
                            password
                        })
                    });

                    const fallbackData = await parseSafeJson(fallbackResponse);
                    if (fallbackResponse.ok && fallbackData.success) {
                        registrationSuccess = true;
                        registrationMessage = 'Registration successful! Redirecting to login...';
                        userPayload = fallbackData.farmer || fallbackData.user || { username: normalizedUsername, name: displayName, phone: phoneNumber };
                    } else {
                        registrationMessage = fallbackData.message || fallbackData.error || 'Registration failed. Please try again.';
                    }
                } else if (!(authRegisterResponse.ok && authRegisterData.status === 'success' && authRegisterData.userId)) {
                    registrationMessage = authRegisterData.message || authRegisterData.error || 'Registration failed. Please check your details and try again.';
                } else {
                    // Step 2: Profile completion
                    const profileResponse = await fetch('/api/auth/register-profile', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            userId: authRegisterData.userId,
                            name: displayName,
                            email,
                            location: subCounty,
                            ward: subCounty,
                            farm_size: farmSize || null,
                            preferred_language: 'english'
                        })
                    });

                    const profileData = await parseSafeJson(profileResponse);

                    if (profileResponse.ok && profileData.status === 'success') {
                        registrationSuccess = true;
                        registrationMessage = 'Registration successful! Redirecting to login...';
                        userPayload = profileData.user || { username: normalizedUsername, name: displayName, phone: phoneNumber };
                    } else {
                        registrationMessage = profileData.message || profileData.error || 'Profile setup failed. Please try again.';
                    }
                }

                if (registrationSuccess) {
                    showMessage(registrationMessage, 'success');
                    localStorage.setItem('fahamu_user', JSON.stringify(userPayload || {}));

                    // Redirect to login with username prefilled
                    setTimeout(() => {
                        window.location.href = `/login.html?username=${encodeURIComponent(normalizedUsername)}`;
                    }, 1500);
                } else {
                    showMessage(registrationMessage, 'error');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showMessage('Network error. Please try again.', 'error');
            } finally {
                // Reset button state
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        });

        // Form field validation
        document.getElementById('phoneNumber').addEventListener('blur', function() {
            const phone = normalizeKenyaPhone(this.value);
            if (phone && !phone.startsWith('+2547')) {
                showMessage('Please enter a valid Kenyan phone number', 'error');
            }
        });
    </script>
</body>
</html>
