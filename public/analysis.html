<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Insights Retired - Fahamu Shamba</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-950: #173320;
            --forest-800: #2c6b41;
            --gold-500: #efb243;
            --ink-700: #46594c;
            --white: #ffffff;
            --shadow: 0 28px 70px rgba(20, 42, 28, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: 'Manrope', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(239, 178, 67, 0.14), transparent 28%),
                radial-gradient(circle at bottom right, rgba(44, 107, 65, 0.16), transparent 32%),
                linear-gradient(180deg, #f9fbf5 0%, #eef5ed 100%);
            color: var(--forest-950);
        }

        .card {
            width: min(720px, 100%);
            padding: 34px;
            border-radius: 34px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .eyebrow {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(239, 178, 67, 0.18);
            color: var(--forest-800);
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        h1 {
            margin: 18px 0 12px;
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2.2rem, 6vw, 3.8rem);
            line-height: 1.02;
        }

        p {
            margin: 0 auto;
            max-width: 56ch;
            color: var(--ink-700);
            font-size: 1rem;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin-top: 28px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            border-radius: 999px;
            font-weight: 800;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--forest-800), #41895a);
            color: var(--white);
        }

        .btn-secondary {
            background: rgba(23, 51, 32, 0.08);
            color: var(--forest-950);
        }
    </style>
    <script src="/js/chatbot-widget.js" defer></script>
</head>
<body>
    <div class="card">
        <div class="eyebrow">Page retired</div>
        <h1>Farm Insights has been removed.</h1>
        <p>The public farm insights dashboard is no longer part of the product experience. You can return to the main site, or open the secured admin console if you are an authorized administrator.</p>
        <div class="actions">
            <a class="btn btn-primary" href="/admin">Open Admin Console</a>
            <a class="btn btn-secondary" href="/">Back to Home</a>
        </div>
    </div>
</body>
</html>
