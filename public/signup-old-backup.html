<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="max-age=31536000, must-revalidate">
    <title>Sign Up - Fahamu Shamba</title>
    
    <!-- Preload Critical Assets -->
    <link rel="preload" href="/fahamu-logo.png" as="image">
    <link rel="preload" href="/language-utils.js" as="script">
    
    <link rel="icon" href="/fahamu-logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/toast.css">
    <script src="/language-utils.js"></script>
    <script src="/js/toast.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: url('/images/irewolede-PvwdlXqo85k-unsplash.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            position: relative;
            color: #fff;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(16, 58, 35, 0.55);
            z-index: 0;
            pointer-events: none;
        }
        body.loaded {
            opacity: 1;
        }
        
        /* Page Loader */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loader-logo {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .page-loader.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2E7D32;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            z-index: 1;
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo img {
            height: 80px;
            margin-bottom: 10px;
        }
        .logo h1 {
            color: #2E7D32;
            font-size: 24px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }

        .toggle-buttons {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .type-btn {
            flex: 1;
            border: 2px solid #2E7D32;
            background: rgba(46, 125, 50, 0.1);
            color: #2E7D32;
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .type-btn.active {
            background: #2E7D32;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2E7D32;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #F57C00;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #e65100;
            transform: translateY(-2px);
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #2E7D32;
            text-decoration: none;
            font-weight: 600;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .back-link a {
            color: #666;
            text-decoration: none;
        }
        
        /* ===== LANGUAGE SELECTOR ===== */
        .language-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .language-label {
            font-weight: bold;
            color: #2E7D32;
            font-size: 0.9rem;
        }
        .language-dropdown-container {
            position: relative;
            display: inline-block;
        }
        .language-dropdown-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 14px;
            background: #2E7D32;
            color: white;
            border: 2px solid white;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            min-width: 120px;
            transition: all 0.3s ease;
        }
        .language-dropdown-btn:hover {
            background: #1B5E20;
        }
        .language-dropdown-btn i {
            font-size: 0.75rem;
        }
        .language-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            z-index: 1000;
            margin-top: 5px;
            overflow: hidden;
        }
        .language-dropdown-menu.show {
            display: block;
        }
        .language-option {
            padding: 10px 14px;
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .language-option:hover {
            background: #2E7D32;
            color: white;
        }
        
        /* Password toggle styles */
        .password-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 18px;
            padding: 5px;
            transition: color 0.3s;
        }
        .password-toggle:hover {
            color: #2E7D32;
        }
    </style>
    <link rel="stylesheet" href="/css/mobile-responsiveness-fixes.css">
</head>
<body class="loading">
    <div class="page-loader" id="pageLoader">
        <img src="/fahamu-logo.png" alt="Loading..." class="loader-logo">
        <div class="loader-spinner"></div>
    </div>
    <div class="container">
        <div class="language-wrapper">
            <span class="language-label">Language:</span>
            <div class="language-dropdown-container">
                <button type="button" class="language-dropdown-btn" id="languageBtn" onclick="toggleLanguageDropdown()">
                    <span id="languageBtnText">Choose Language</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="language-dropdown-menu" id="languageDropdownMenu">
                    <div class="language-option" onclick="selectLanguage('en', '🌐 English')">🌐 English</div>
                    <div class="language-option" onclick="selectLanguage('sw', '🌐 Kiswahili')">🌐 Kiswahili</div>
                    <div class="language-option" onclick="selectLanguage('luo', '🌐 Dholuo')">🌐 Dholuo</div>
                </div>
            </div>
            <select id="languageSelect" onchange="changeLanguage(this.value)" style="display:none;">
                <option value="en">English</option>
                <option value="sw">Kiswahili</option>
                <option value="luo">Dholuo</option>
            </select>
        </div>
        <div class="logo">
            <img src="/fahamu-logo.png" alt="Fahamu Shamba">
            <h1 data-i18n="landing_title">Fahamu Shamba</h1>
        </div>
        <h2 data-i18n="create_account"></h2>
        <form id="signupForm">
            <div class="form-group">
                <label>Registration Type</label>
                <div class="toggle-buttons">
                    <button type="button" class="type-btn active" data-type="individual" onclick="selectRegistrationType('individual')">Individual Registration</button>
                    <button type="button" class="type-btn" data-type="group" onclick="selectRegistrationType('group')">Group Registration</button>
                </div>
            </div>

            <div id="individualFields" class="registration-section">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" placeholder="First name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="Last name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="07XXXXXXXX" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="email@example.com">
                </div>
            </div>

            <div id="groupFields" class="registration-section" style="display:none;">
                <div class="form-group">
                    <label>Group Name</label>
                    <input type="text" id="groupName" placeholder="Group name">
                </div>
                <div class="form-group">
                    <label>Group Registration Number</label>
                    <input type="text" id="groupRegistrationNumber" placeholder="Registration number">
                </div>
                <div class="form-group">
                    <label>Group Description</label>
                    <textarea id="groupDescription" placeholder="Brief group description"></textarea>
                </div>
                <div class="form-group">
                    <label>Leader First Name</label>
                    <input type="text" id="leaderFirstName" placeholder="Leader first name">
                </div>
                <div class="form-group">
                    <label>Leader Last Name</label>
                    <input type="text" id="leaderLastName" placeholder="Leader last name">
                </div>
                <div class="form-group">
                    <label>Leader Phone</label>
                    <input type="tel" id="leaderPhone" placeholder="07XXXXXXXX">
                </div>
                <div class="form-group">
                    <label>Leader Email</label>
                    <input type="email" id="leaderEmail" placeholder="leader@example.com">
                </div>
            </div>

            <div class="form-group">
                <label>Sub-county</label>
                <select id="subcounty" required>
                    <option value="">Select sub-county</option>
                    <option value="bondo">Bondo</option>
                    <option value="ugenya">Ugenya</option>
                    <option value="ugunja">Ugunja</option>
                    <option value="gem">Gem</option>
                    <option value="alego">Alego Usonga</option>
                    <option value="rarieda">Rarieda</option>
                </select>
            </div>
            <div class="form-group">
                 <label data-i18n="ward"></label>
                 <select id="ward" required>
                     <option value="" data-i18n="select_ward"></option>
                 </select>
             </div>
            <div class="form-group">
                <label>Soil Type</label>
                <select id="soilType" required>
                    <option value="">Choose soil type</option>
                    <option value="loam">Loam</option>
                    <option value="sandy">Sandy</option>
                    <option value="clay">Clay</option>
                    <option value="silt">Silt</option>
                </select>
            </div>
            <div class="form-group">
                <label>Water Source</label>
                <select id="waterSource" required>
                    <option value="">Choose water source</option>
                    <option value="rain">Rain</option>
                    <option value="irrigation">Irrigation</option>
                    <option value="river">River</option>
                    <option value="borehole">Borehole</option>
                </select>
            </div>
            <div class="form-group">
                <label>Estimated Budget (Ksh)</label>
                <input type="number" id="budget" placeholder="Estimated budget" min="0" required>
            </div>
            <div class="form-group">
                <label data-i18n="farm_size"></label>
                <input type="number" id="farmSize" data-i18n-placeholder="example_farm_size" required>
            </div>
            <div class="form-group">
                <label>Profile Photo (optional)</label>
                <input type="file" id="profilePhoto" accept="image/*">
            </div>
            <div class="form-group">
                <label data-i18n="password"></label>
                <div class="password-wrapper">
                    <input type="password" id="password" data-i18n-placeholder="create_password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('password')">
                        <i class="fas fa-eye" id="password-icon"></i>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label data-i18n="confirm_password"></label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" data-i18n-placeholder="confirm_your_password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                        <i class="fas fa-eye" id="confirmPassword-icon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn" data-i18n="create_account"></button>
        </form>
        <div class="links">
            <p><span data-i18n="already_have_account"></span> <a href="/login.html" data-i18n="login"></a></p>
        </div>
        <div class="back-link">
            <a href="/"><i class="fas fa-arrow-left"></i> <span data-i18n="back_home"></span></a>
        </div>
    </div>
    <script>
         // Ward mapping for each sub-county in Siaya County, Kenya
         const wardMapping = {
             'bondo': [
                 'Central Bondo',
                 'East Bondo',
                 'North Bondo',
                 'South Bondo',
                 'West Bondo'
             ],
             'ugenya': [
                 'Central Ugenya',
                 'East Ugenya',
                 'North Ugenya',
                 'South Ugenya',
                 'West Ugenya'
             ],
             'ugunja': [
                 'Blasdel',
                 'Central',
                 'East',
                 'Kolanya',
                 'West'
             ],
             'gem': [
                 'Arwiny',
                 'Central',
                 'East',
                 'North',
                 'South'
             ],
             'alego': [
                 'Alego Central',
                 'Boro',
                 'East Alego',
                 'North Alego',
                 'West Alego'
             ],
             'rarieda': [
                 'Central Rarieda',
                 'East Rarieda',
                 'North Rarieda',
                 'South Rarieda',
                 'West Rarieda'
             ]
         };
         
         // Update ward dropdown based on selected sub-county
         function updateWardDropdown() {
             const subcountySelect = document.getElementById('subcounty');
             const wardSelect = document.getElementById('ward');
             const selectedSubcounty = subcountySelect.value;
             
             // Clear current ward options (except first empty option)
             while (wardSelect.options.length > 1) {
                 wardSelect.remove(1);
             }
             
             // Reset ward selection
             wardSelect.value = '';
             
             // Populate wards if a sub-county is selected
             if (selectedSubcounty && wardMapping[selectedSubcounty]) {
                 wardMapping[selectedSubcounty].forEach(ward => {
                     const option = document.createElement('option');
                     option.value = ward.toLowerCase().replace(/\s+/g, '_');
                     option.textContent = ward;
                     wardSelect.appendChild(option);
                 });
             }
         }
         
         // Initialize language on page load
         document.addEventListener('DOMContentLoaded', () => {
            initializeLanguage();
            
            // Allow small delay for translations to apply before showing page
            setTimeout(() => {
                const loader = document.getElementById('pageLoader');
                if (loader) loader.classList.add('fade-out');
                document.body.classList.add('loaded');
                document.body.classList.remove('loading');
            }, 500);
            
            // Add event listener for sub-county change
            const subcountySelect = document.getElementById('subcounty');
            if (subcountySelect) {
                subcountySelect.addEventListener('change', updateWardDropdown);
            }

            // Set registration mode from URL query if provided
            const queryMode = new URLSearchParams(window.location.search).get('mode');
            if (queryMode === 'group') {
                selectRegistrationType('group');
            } else {
                selectRegistrationType('individual');
            }
         });
        
        // Language functions
        function changeLanguage(lang) {
            setLanguage(lang);
            translatePage(lang);
        }
        
        // Custom dropdown functions
        function toggleLanguageDropdown() {
            const menu = document.getElementById('languageDropdownMenu');
            if (menu) menu.classList.toggle('show');
        }
        
        function selectLanguage(lang, text) {
            const btnText = document.getElementById('languageBtnText');
            if (btnText) btnText.textContent = text;

            const normalizedLang = {
                'en': 'english',
                'sw': 'swahili',
                'luo': 'luo'
            }[lang] || 'english';
            
            const select = document.getElementById('languageSelect');
            if (select) select.value = normalizedLang;

            const menu = document.getElementById('languageDropdownMenu');
            if (menu) menu.classList.remove('show');
            changeLanguage(normalizedLang);
        }
        
        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const container = document.querySelector('.language-dropdown-container');
            if (container && !container.contains(event.target)) {
                const menu = document.getElementById('languageDropdownMenu');
                if (menu) menu.classList.remove('show');
            }
        });
        
        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(inputId + '-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        function normalizeKenyaPhone(phone) {
            const digits = (phone || '').replace(/\D/g, '');
            if (digits.startsWith('0') && digits.length === 10) return `254${digits.slice(1)}`;
            if (digits.startsWith('7') && digits.length === 9) return `254${digits}`;
            if (digits.startsWith('254') && digits.length === 12) return digits;
            return phone;
        }

        let selectedRegistrationType = 'individual';

        function selectRegistrationType(type) {
            selectedRegistrationType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
            document.getElementById('individualFields').style.display = type === 'individual' ? 'block' : 'none';
            document.getElementById('groupFields').style.display = type === 'group' ? 'block' : 'none';
        }

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const isGroup = selectedRegistrationType === 'group';
            const firstName = document.getElementById('firstName')?.value.trim() || '';
            const lastName = document.getElementById('lastName')?.value.trim() || '';
            const phone = normalizeKenyaPhone(document.getElementById('phone')?.value || '');
            const email = document.getElementById('email')?.value.trim() || '';
            const groupName = document.getElementById('groupName')?.value.trim() || '';
            const groupRegistrationNumber = document.getElementById('groupRegistrationNumber')?.value.trim() || '';
            const groupDescription = document.getElementById('groupDescription')?.value.trim() || '';
            const leaderFirstName = document.getElementById('leaderFirstName')?.value.trim() || '';
            const leaderLastName = document.getElementById('leaderLastName')?.value.trim() || '';
            const leaderPhone = normalizeKenyaPhone(document.getElementById('leaderPhone')?.value || '');
            const leaderEmail = document.getElementById('leaderEmail')?.value.trim() || '';
            const subCounty = document.getElementById('subcounty')?.value.trim() || '';
            const ward = document.getElementById('ward')?.value.trim() || '';
            const farmSize = document.getElementById('farmSize')?.value.trim() || '';
            const password = document.getElementById('password')?.value || '';
            const confirmPassword = document.getElementById('confirmPassword')?.value || '';

            if (password !== confirmPassword) {
                showToast(t('passwords_do_not_match'), 'error');
                return;
            }

            if (!isGroup && (!firstName || !lastName || !phone)) {
                showToast('First name, last name, and phone are required for individual registration.', 'error');
                return;
            }

            if (isGroup && (!groupName || !groupRegistrationNumber || !leaderFirstName || !leaderLastName || !leaderPhone)) {
                showToast('Group name, registration number and leader contact are required for group registration.', 'error');
                return;
            }

            if (!subCounty) {
                showToast('Subcounty is required.', 'error');
                return;
            }

            const submitBtn = document.querySelector('#signupForm .btn');

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = t('loading');

                const payload = {
                    isGroup,
                    phoneNumber: isGroup ? leaderPhone : phone,
                    firstName: isGroup ? null : firstName,
                    lastName: isGroup ? null : lastName,
                    email: isGroup ? leaderEmail : email,
                    subCounty,
                    ward,
                    farmSize: Number(farmSize) || 0,
                    soilType: document.getElementById('soilType') ? document.getElementById('soilType').value : '',
                    waterSource: document.getElementById('waterSource') ? document.getElementById('waterSource').value : '',
                    budget: Number(document.getElementById('budget') ? document.getElementById('budget').value : 0) || 0,
                    preferredLanguage: getCurrentLanguage(),
                    groupName: isGroup ? groupName : null,
                    groupRegistrationNumber: isGroup ? groupRegistrationNumber : null,
                    groupDescription: isGroup ? groupDescription : null,
                    leaderFirstName: isGroup ? leaderFirstName : null,
                    leaderLastName: isGroup ? leaderLastName : null,
                    leaderPhone: isGroup ? leaderPhone : null,
                    leaderEmail: isGroup ? leaderEmail : null,
                    password
                };

                const registerRes = await fetch('/api/farmers/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const registerData = await registerRes.json();
                if (!registerRes.ok || !registerData.success) {
                    throw new Error(registerData.message || t('registration_failed'));
                }

                showToast(t('registration_success'), 'success');
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 1500);
            } catch (error) {
                showToast(error.message || t('registration_failed'), 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = t('create_account');
            }
        });
    </script>
</body>
</html>
